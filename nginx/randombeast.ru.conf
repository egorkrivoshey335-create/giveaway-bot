# =============================================================================
# randombeast.ru + www.randombeast.ru — Marketing Site (Next.js, port 3001)
# =============================================================================

# HTTP → HTTPS redirect (включая www)
server {
    listen 80;
    listen [::]:80;
    server_name randombeast.ru www.randombeast.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://randombeast.ru$request_uri;
    }
}

# www → non-www redirect (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.randombeast.ru;

    ssl_certificate     /etc/letsencrypt/live/randombeast.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/randombeast.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://randombeast.ru$request_uri;
}

# HTTPS — основной блок сайта
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name randombeast.ru;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/randombeast.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/randombeast.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # =========================================================================
    # Security Headers
    # =========================================================================

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.randombeast.ru; frame-src https://telegram.org; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # =========================================================================
    # Gzip
    # =========================================================================

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    # =========================================================================
    # Static assets cache
    # =========================================================================

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Sitemap и robots.txt — небольшое кеширование
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # =========================================================================
    # Статическая страница 503 при падении сайта
    # =========================================================================

    error_page 502 503 504 /503.html;
    location = /503.html {
        root /var/www/randombeast;
        internal;
    }

    # =========================================================================
    # Proxy to Next.js Site (port 3001)
    # =========================================================================

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
