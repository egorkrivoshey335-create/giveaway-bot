<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RandomBeast — Технические работы</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #f2b6b6; }
    p { font-size: 16px; color: #888; line-height: 1.6; }
    .retry {
      margin-top: 32px;
      display: inline-block;
      padding: 12px 28px;
      background: #f2b6b6;
      color: #0f0f0f;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎲</div>
    <h1>Технические работы</h1>
    <p>Мы обновляем RandomBeast. Уже скоро вернёмся!</p>
    <a href="/" class="retry" onclick="location.reload()">Обновить страницу</a>
  </div>
</body>
</html>
